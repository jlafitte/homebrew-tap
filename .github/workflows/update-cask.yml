name: Auto-update Casks
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  update-casks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Update PixelPerfect
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/cormiertyshawn895/PixelPerfect/releases/latest | jq -r '.tag_name')
          brew bump-cask-pr \
            --version "$VERSION" \
            --no-fork \
            --no-browse \
            --message "Update PixelPerfect to $VERSION" \
            ${{ github.repository }}/pixelperfect
