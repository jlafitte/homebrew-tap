name: Auto-update Formula
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v6

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          debug: false
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_FROM_API: ""
          HOMEBREW_NO_ENV_HINTS: "1"

      - name: Update GeminiWatermarkTool
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          formula: gemini-watermark-tool
          tap: ${{ github.repository }}
          livecheck: true
          force: true
          no_fork: true

      - name: Update gwt-mini
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          formula: gwt-mini
          tap: ${{ github.repository }}
          livecheck: true
          force: true
          no_fork: true

      - name: Update uad-ng
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          formula: uad-ng
          tap: ${{ github.repository }}
          livecheck: true
          force: true
          no_fork: true
